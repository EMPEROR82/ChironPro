<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    background: #1e1e1e;
    display: flex;
    flex-direction: column;
  }

  #toolbar {
    padding: 6px 12px;
    background: #2d2d2d;
    color: #ccc;
    font-family: monospace;
    font-size: 12px;
  }

  canvas {
    display: block;
    margin: auto;
  }

  #log {
    color: #9cdcfe;
    font-family: monospace;
    font-size: 12px;
    padding: 8px 12px;
    max-height: 120px;
    overflow-y: auto;
    background: #2d2d2d;
  }
</style>
</head>
<body>
<div id="toolbar">🐢 Chiron Turtle Preview</div>
<canvas id="c" width="700" height="700"></canvas>
<div id="log"></div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const log = document.getElementById('log');

  const CX = canvas.width / 2;
  const CY = canvas.height / 2;

  function tx(x) { return CX + x; }
  function ty(y) { return CY - y; }

  let turtlePos = { x: 0, y: 0, angle: 90 };

  // No hardcoded color defaults here.
  // These are always set by the 'init' message sent from client.ts,
  // which reads them from VS Code settings (package.json defaults).
  let penColor    = null;
  let turtleColor = null;
  let bgColor     = null;

  const drawnLines = [];
  const commandQueue = [];
  let isAnimating = false;

  let MOVE_SPEED = 4; // pixels per frame

  // ─────────────────────────────────────────
  // Turtle
  // ─────────────────────────────────────────
  function drawTurtle(x, y, angle) {
    ctx.save();
    ctx.translate(tx(x), ty(y));
    ctx.rotate(-angle * Math.PI / 180);
    ctx.fillStyle = turtleColor;

    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.lineTo(-6, 8);
    ctx.lineTo(6, 8);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function redrawCanvas(tempLine = null) {
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const line of drawnLines) {
      ctx.beginPath();
      ctx.strokeStyle = line.color;
      ctx.lineWidth = 2;
      ctx.moveTo(tx(line.x1), ty(line.y1));
      ctx.lineTo(tx(line.x2), ty(line.y2));
      ctx.stroke();
    }

    if (tempLine) {
      ctx.beginPath();
      ctx.strokeStyle = tempLine.color;
      ctx.lineWidth = 2;
      ctx.moveTo(tx(tempLine.x1), ty(tempLine.y1));
      ctx.lineTo(tx(tempLine.x2), ty(tempLine.y2));
      ctx.stroke();
    }

    drawTurtle(turtlePos.x, turtlePos.y, turtlePos.angle);
  }

  // ─────────────────────────────────────────
  // Queue
  // ─────────────────────────────────────────
  window.addEventListener('message', (event) => {
    commandQueue.push(event.data);

    if (!isAnimating) {
      processQueue();
    }
  });

  function processQueue() {
    if (commandQueue.length === 0) {
      isAnimating = false;
      return;
    }

    isAnimating = true;
    const msg = commandQueue.shift();

    handleCommand(msg, processQueue);
  }

  // ─────────────────────────────────────────
  // Smooth line animation
  // ─────────────────────────────────────────
  function animateLine(data, done) {
    const dx = data.x2 - data.x1;
    const dy = data.y2 - data.y1;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // All three colors are stamped onto every line message by client.ts from VS Code settings
    const lineColor   = data.color;
    turtleColor       = data.turtle_color;
    bgColor           = data.bg;

    let progress = 0;

    function step() {
      progress += MOVE_SPEED;

      const t = Math.min(progress / dist, 1);

      const cx = data.x1 + dx * t;
      const cy = data.y1 + dy * t;

      turtlePos.x = cx;
      turtlePos.y = cy;

      redrawCanvas({
        x1: data.x1,
        y1: data.y1,
        x2: cx,
        y2: cy,
        color: lineColor
      });

      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        drawnLines.push({
          x1: data.x1,
          y1: data.y1,
          x2: data.x2,
          y2: data.y2,
          color: lineColor
        });

        turtlePos.x = data.x2;
        turtlePos.y = data.y2;

        redrawCanvas();
        done();
      }
    }

    requestAnimationFrame(step);
  }

  // ─────────────────────────────────────────
  // Commands
  // ─────────────────────────────────────────
  function handleCommand(message, done) {
    console.log("WEBVIEW MESSAGE:", message);

    const { cmd, data } = message;

    if (cmd === 'init') {
      // Authoritative: always trust these values — they come from VS Code settings
      bgColor     = data.bg;
      penColor    = data.pen_color;
      turtleColor = data.turtle_color;

      MOVE_SPEED  = (typeof data.move_speed === 'number' && data.move_speed > 0)
                  ? data.move_speed
                  : 4;
                  
      canvas.style.background = bgColor;
      turtlePos = { x: 0, y: 0, angle: 90 };
      drawnLines.length = 0;
      redrawCanvas();
      done();

    } else if (cmd === 'line') {
      animateLine(data, done);

    } else if (cmd === 'turtle_pos') {
      turtlePos = data;
      redrawCanvas();
      done();

    } else if (cmd === 'rotate') {
      turtlePos.angle = data.angle;
      redrawCanvas();
      done();

    } else if (cmd === 'pen') {
      document.getElementById('toolbar').textContent =
        '🐢 Chiron Turtle Preview  |  Pen: ' + (data.down ? '✏️ down' : '⬆️ up');
      done();

    } else if (cmd === 'print') {
      const div = document.createElement('div');
      div.textContent = '› ' + data.text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      done();

    } else {
      done();
    }
  }
</script>
</body>
</html>
